<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>爱心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(45deg, #000000, #1a1a2e, #16213e, #0f3460);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        .heart {
            position: relative;
            width: 200px;
            height: 200px;
            background-color: #e74c3c;
            transform: rotate(-45deg);
            cursor: pointer;
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.7);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: rotate(-45deg) scale(1);
            }
            50% {
                transform: rotate(-45deg) scale(1.1);
            }
            100% {
                transform: rotate(-45deg) scale(1);
            }
        }
        
        .heart-container {
            position: relative;
            display: inline-block;
        }
        
        .blessing {
            position: absolute;
            color: white;
            font-size: 16px;
            font-weight: bold;
            pointer-events: none;
            animation: floatAway 5s ease-out forwards, colorChange 5s ease-in-out infinite;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }
        
        .heart:before,
        .heart:after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background-color: #e74c3c;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.7);
        }
        
        .heart:before {
            top: -100px;
            left: 0;
        }
        
        .heart:after {
            top: 0;
            left: 100px;
        }
        
        .heart-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            width: 120px;
            z-index: 1;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        
        @keyframes floatAway {
            0% {
                opacity: 1;
                transform: rotate(-45deg) scale(1);
            }
            100% {
                opacity: 0;
                transform: rotate(-45deg) scale(0.3) translateY(-500px);
            }
        }
        
        @keyframes colorChange {
            0% {
                background-color: #e74c3c;
            }
            25% {
                background-color: #ff6b6b;
            }
            50% {
                background-color: #ff8787;
            }
            75% {
                background-color: #ff9e9e;
            }
            100% {
                background-color: #e74c3c;
            }
        }
        
        @media (max-width: 768px) {
            .heart {
                width: 150px;
                height: 150px;
            }
            
            .heart:before,
            .heart:after {
                width: 150px;
                height: 150px;
            }
            
            .heart:before {
                top: -75px;
            }
            
            .heart:after {
                left: 75px;
            }
            
            .heart-content {
                font-size: 1rem;
                width: 90px;
            }
        }
    </style>
</head>
<body>
    <div class="heart-container">
        <div class="heart" id="heart">
            <div class="heart-content">
                王姐最美了
            </div>
        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const heart = document.getElementById('heart');
            const heartContainer = heart.parentElement;
            
            // 定义祝福语数组
            const blessings = [
                '王姐最美！',
                '永远年轻！',
                '天天开心！',
                '心想事成！',
                '笑口常开！',
                '美丽动人！',
                '青春永驻！',
                '幸福安康！',
                '吉祥如意！',
                '万事顺意！'
            ];
            
            heart.addEventListener('click', function(e) {
                // 生成多个祝福语
                for (let i = 0; i < 5; i++) {
                    createBlessing(e);
                }
            });
            
            function createBlessing(e) {
                const blessing = document.createElement('div');
                blessing.classList.add('blessing');
                
                // 随机选择祝福语
                const randomBlessing = blessings[Math.floor(Math.random() * blessings.length)];
                blessing.textContent = randomBlessing;
                
                // 计算位置
                const heartRect = heart.getBoundingClientRect();
                
                // 随机位置在心脏范围内
                const x = Math.random() * (heartRect.width - 80);
                const y = Math.random() * (heartRect.height - 30);
                
                // 设置位置
                blessing.style.left = x + 'px';
                blessing.style.top = y + 'px';
                
                // 为每个祝福语添加随机的动画延迟
                const delay = Math.random() * 2;
                // 重新设置完整的动画属性，包括两个动画和延迟
                blessing.style.animation = `floatAway 5s ease-out forwards ${delay}s, colorChange 5s ease-in-out infinite ${delay}s`;
                
                // 添加到容器
                heartContainer.appendChild(blessing);
                
                // 动画结束后移除
                setTimeout(function() {
                    blessing.remove();
                }, 5000);
            }
        });
    </script>
</body>
</html>
